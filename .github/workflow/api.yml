name: API Pipeline

on:
  push:
    paths:
      - "orchestrator/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv

      - working-directory: orchestrator
        run: uv sync

      - working-directory: orchestrator
        run: uv run ruff check .

      - working-directory: orchestrator
        run: uv run mypy .

      - working-directory: orchestrator
        run: uv run pytest